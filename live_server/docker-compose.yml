services:
  redis:
    image: redis:latest
    container_name: opentranslive-redis

  mongodb:
    image: mongo:latest
    container_name: opentranslive-db
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: opentranslive-app
    ports:
      - "${SERVER_PORT:-5000}:5000"
    volumes:
      - ./app:/app/app
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    command: ["./.venv/bin/uvicorn", "app:socket_app", "--host", "0.0.0.0", "--port", "5000", "--workers", "${SERVER_WORKERS:-2}", "--ws", "websockets", "--reload"]
    depends_on:
      - redis
      - mongodb

volumes:
  mongo_data:
