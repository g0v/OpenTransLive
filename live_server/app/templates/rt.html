{% extends "base.html" %} {% block content %}
<div class="flex flex-col h-svh">
  <!-- Status Bar -->
  <div class="flex items-center p-2 bg-gray-100 h-[5vh] gap-2 text-xs">
    <span>View:</span>
    <select id="combined-select" class="inline-block border-1 border-gray-400 rounded-md p-1 me-auto"></select>
    <div id="qr-area" class="cursor-pointer bg-gray-200 px-2 py-1 rounded-md">
      show qrcode
      <img class="w-25vw h-25vw fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 hidden" src="" />
    </div>
    <a href="/download/{{ id }}" target="_blank"
      class="text-xs cursor-pointer bg-gray-200 px-2 py-1 rounded-md">JSON</a>
    <div>
      <span id="status-indicator" class="inline-block w-3 h-3 rounded-full bg-gray-400"></span>
      <span id="status-text" class="ms-1">Connecting...</span>
    </div>
  </div>

  <!-- Single Language View -->
  <div id="single-view" class="flex-grow overflow-auto">
    <div id="data-content" class="p-2 break-all whitespace-pre-wrap text-xl max-h-full overflow-auto"></div>
  </div>

  <!-- Grid Layout View -->
  <div id="grid-view" class="flex-grow overflow-auto p-2 hidden">
    <div id="grid-content" class="flex flex-wrap max-h-full whitespace-pre-wrap text-xl">
      <!-- Grid items will be dynamically generated with auto-calculated columns -->
    </div>
  </div>
</div>
{% endblock %} {% block head %}
<style>
  @keyframes new-text-highlight {
    0% {
      background-color: rgba(149, 0, 255, 0.3);
    }

    20% {
      background-color: rgba(149, 0, 255, 0.3);
    }

    80% {
      background-color: transparent;
    }

    100% {
      background-color: inherit;
    }
  }

  .new-text {
    animation: new-text-highlight 2s ease-out forwards;
  }

  .prediction-text {
    opacity: 0.4;
    font-style: italic;
  }
</style>
{% endblock %} {% block scripts %}
<script>
  let transcriptionsData = {{ data | tojson(indent = 2) }};
  let lastSubtitle = null;
  let currentLayout = 'grid'; // 'single' or 'grid'
  let currentLanguages = [];
  // prediction: the latest speculative continuation, cleared when a real update arrives
  // shape mirrors transcriptionsData.partial but with is_prediction=true
  // Track already-rendered text per language key to enable incremental append
  const renderedText = new Map();
  const statusIndicator = document.getElementById('status-indicator');
  const statusText = document.getElementById('status-text');

  function populateCombinedSelect() {
    let languages = null;
    if (transcriptionsData?.partial) {
      languages = Object.keys(transcriptionsData.partial.result.translated || {});
    } else if (transcriptionsData?.transcriptions) {
      languages = Object.keys(transcriptionsData.transcriptions[transcriptionsData.transcriptions.length - 1]?.result?.translated || {});
    }
    if (!languages) {
      return;
    }
    const combinedSelect = document.getElementById('combined-select');
    if (currentLanguages.length >= 0 && languages.every(language => currentLanguages.includes(language)) && languages.length === currentLanguages.length) {
      return;
    }
    let currentSelect = combinedSelect.value;
    if (!currentSelect) {
      currentSelect = 'grid';
    }
    currentLanguages = languages;
    // Clear existing options
    combinedSelect.innerHTML = '';

    const gridOption = document.createElement('option');
    gridOption.value = 'grid';
    gridOption.textContent = 'All';
    combinedSelect.appendChild(gridOption);

    // Add language-specific options
    languages.forEach(language => {
      const option = document.createElement('option');
      option.value = `single-${language}`;
      option.textContent = `${language}`;
      combinedSelect.appendChild(option);
    });
    combinedSelect.value = currentSelect;
    combinedSelect.dispatchEvent(new Event('change'));
  }

  function refreshView() {
    if (currentLayout === 'single') {
      refreshSingleView();
    } else {
      refreshGridView();
    }
  }

  // Update committed text (plain, no animation) and partial text (animated).
  // container must have three child elements: [0] committed, [1] partial, [2] prediction.
  function updateContent(container, key, committedText, partialText, scrollParent, predictionText) {
    const committedEl = container.children[0];
    const partialEl = container.children[1];
    const predictionEl = container.children[2];

    if (committedEl.textContent !== committedText) {
      committedEl.textContent = committedText;
    }

    const prevPartial = renderedText.get(key) || '';
    if (prevPartial !== partialText) {
      partialEl.textContent = partialText;
      partialEl.classList.remove('new-text');
      // Force reflow to restart animation
      void partialEl.offsetWidth;
      if (partialText) {
        partialEl.classList.add('new-text');
      }
      renderedText.set(key, partialText);
      setTimeout(() => {
        (scrollParent || container).scrollTop = (scrollParent || container).scrollHeight;
      }, 10);
    }

    // Prediction text: shown only when there is a partial and a prediction extends it
    const resolvedPrediction = predictionText || '';
    if (predictionEl.textContent !== resolvedPrediction) {
      predictionEl.textContent = resolvedPrediction;
    }
  }

  function makeContentContainer() {
    const wrapper = document.createElement('div');
    wrapper.className = 'contents';
    const committed = document.createElement('span');
    const partial = document.createElement('span');
    partial.addEventListener('animationend', () => partial.classList.remove('new-text'));
    const prediction = document.createElement('span');
    prediction.className = 'prediction-text';
    wrapper.appendChild(committed);
    wrapper.appendChild(partial);
    wrapper.appendChild(prediction);
    return wrapper;
  }

  function refreshSingleView() {
    if (transcriptionsData.transcriptions?.length > 0) {
      const dataContent = document.getElementById('data-content');
      const selectedValue = document.getElementById('combined-select').value;

      let selectedLanguage;
      if (selectedValue.startsWith('single-')) {
        selectedLanguage = selectedValue.replace('single-', '');
      } else {
        selectedLanguage = Object.keys(transcriptionsData.transcriptions[transcriptionsData.transcriptions.length - 1]?.result?.translated || {})[0];
      }

      // Ensure wrapper exists
      if (!dataContent.children.length) {
        dataContent.appendChild(makeContentContainer());
      }
      const wrapper = dataContent.children[0];

      let committedText, partialText, predictionText;
      committedText = transcriptionsData.transcriptions.map(s => s.result.translated[selectedLanguage]).join('\n');
      partialText = transcriptionsData.partial ? '\n' + transcriptionsData.partial.result.translated[selectedLanguage] : '';

      // Prediction: show only the extra words beyond the current partial
      predictionText = '';
      if (transcriptionsData.prediction && transcriptionsData.partial) {
        const predFull = transcriptionsData.prediction.result.translated[selectedLanguage] || '';
        const partFull = transcriptionsData.partial.result.translated[selectedLanguage] || '';
        predictionText = predFull.startsWith(partFull) ? predFull.slice(partFull.length) : '';
      }

      const key = 'single:' + selectedLanguage;
      updateContent(wrapper, key, committedText, partialText, dataContent, predictionText);
    }
  }

  function refreshGridView() {
    if (transcriptionsData.transcriptions?.length > 0) {
      const gridContent = document.getElementById('grid-content');
      const languages = Object.keys(transcriptionsData.transcriptions[transcriptionsData.transcriptions.length - 1]?.result?.translated || {});
      const recentTranscriptions = transcriptionsData.transcriptions;

      // Auto-calculate optimal grid size based on number of languages
      const languageCount = languages.length;
      let gridCols;

      if (languageCount <= 1) {
        gridCols = 1;
      } else if (languageCount <= 4) {
        gridCols = 2; // 2x2 grid
      } else if (languageCount <= 9) {
        gridCols = 3; // 3x3 grid
      } else if (languageCount <= 16) {
        gridCols = 4; // 4x4 grid
      } else if (languageCount <= 25) {
        gridCols = 5; // 5x5 grid
      } else {
        gridCols = Math.ceil(Math.sqrt(languageCount)); // Auto-calculate for more languages
      }

      // Apply the calculated grid columns with responsive behavior
      const screenWidth = window.innerWidth;
      let actualCols = gridCols;

      // Adjust for smaller screens
      if (screenWidth < 768) { // Mobile
        actualCols = Math.min(gridCols, 1);
      } else if (screenWidth < 1024) { // Tablet
        actualCols = Math.min(gridCols, 2);
      } else if (screenWidth < 1280) { // Small desktop
        actualCols = Math.min(gridCols, 3);
      }
      let actualRows = Math.ceil(languageCount / actualCols);

      // Check if we need to rebuild the grid (language count changed or first time)
      const existingBoxes = gridContent.children;
      const needsRebuild = existingBoxes.length !== languages.length;

      if (needsRebuild) {
        gridContent.innerHTML = '';
        // Clear cached rendered text so all content re-animates after rebuild
        languages.forEach(lang => renderedText.delete('grid:' + lang));

        languages.forEach(language => {
          const languageBox = document.createElement('div');
          languageBox.className = `border-2 border-gray-200 py-1 w-[${99.9 / actualCols}%] h-[${93 / actualRows}vh]`;
          languageBox.setAttribute('data-language', language);

          const languageCard = document.createElement('div');
          languageCard.className = `px-1 h-full overflow-auto break-all whitespace-pre-wrap leading-relaxed`;

          languageCard.appendChild(makeContentContainer());
          languageBox.appendChild(languageCard);
          gridContent.appendChild(languageBox);
        });
      }

      // Update content for each language box
      languages.forEach(language => {
        const languageBox = gridContent.querySelector(`[data-language="${language}"]`);
        if (languageBox) {
          const languageCard = languageBox.querySelector('div');
          const wrapper = languageCard.children[0];

          let committedText = '';
          recentTranscriptions.forEach(subtitle => {
            if (subtitle.result.translated[language]) {
              committedText += subtitle.result.translated[language] + '\n';
            }
          });
          const partialText = transcriptionsData.partial
            ? transcriptionsData.partial.result.translated[language] + '\n'
            : '';

          // Prediction: show only the extra words beyond the current partial
          let predictionText = '';
          if (transcriptionsData.prediction && transcriptionsData.partial) {
            const predFull = transcriptionsData.prediction.result.translated[language] || '';
            const partFull = (transcriptionsData.partial.result.translated[language] || '') + '\n';
            predictionText = predFull.startsWith(partFull.trimEnd())
              ? predFull.slice(partFull.trimEnd().length)
              : '';
          }

          const key = 'grid:' + language;
          updateContent(wrapper, key, committedText, partialText, languageCard, predictionText);
        }
      });
    }
  }

  function switchLayout(selectedValue) {
    if (selectedValue === 'grid') {
      currentLayout = 'grid';
      const singleView = document.getElementById('single-view');
      const gridView = document.getElementById('grid-view');
      singleView.classList.add('hidden');
      gridView.classList.remove('hidden');
    } else {
      currentLayout = 'single';
      const singleView = document.getElementById('single-view');
      const gridView = document.getElementById('grid-view');
      singleView.classList.remove('hidden');
      gridView.classList.add('hidden');
      // Clear single-view container and cache so switching languages re-animates
      const dataContent = document.getElementById('data-content');
      dataContent.innerHTML = '';
      for (const k of renderedText.keys()) {
        if (k.startsWith('single:')) renderedText.delete(k);
      }
    }

    refreshView();
  }

  // Combined select event listener
  document.getElementById('combined-select').addEventListener('change', function () {
    switchLayout(this.value);
  });

  document.addEventListener('DOMContentLoaded', function () {

    const qrImg = document.getElementById('qr-area').querySelector('img');
    qrImg.src = `https://quickchart.io/qr?text=${window.location.href}`;

    // Connect to WebSocket
    const socket = io();

    socket.on('connect', function () {
      statusIndicator.className = 'inline-block w-3 h-3 rounded-full bg-green-500';
      statusText.textContent = 'Connected';
      console.log('WebSocket connection opened');

      // Join the session room
      socket.emit('join_session', { session_id: '{{ id }}' });
    });

    socket.on('disconnect', function () {
      statusIndicator.className = 'inline-block w-3 h-3 rounded-full bg-red-500';
      statusText.textContent = 'Disconnected';
      console.log('WebSocket connection closed');
    });

    socket.on('connected', function (data) {
      console.log('WebSocket connected:', data);
    });

    socket.on('joined_session', function (data) {
      console.log('Joined session:', data);
      statusText.textContent = 'Connected to session: ' + data.session_id;
    });

    socket.on('transcription_update', function (data) {
      console.log('Transcription update received:', data);

      // Prediction update: only refresh the speculative text, do not touch real data
      if (data.is_prediction) {
        // Only show prediction if there is a current partial to extend
        if (transcriptionsData["partial"]) {
          transcriptionsData["prediction"] = data;
          refreshView();
        }
        return;
      }

      // Any real update clears the prediction
      transcriptionsData["prediction"] = null;

      // Check if last_committed is missing from our local list
      if (data.last_committed) {
        const last_committed = data.last_committed;
        const exists = transcriptionsData["transcriptions"].some(t => t.start_time === last_committed.start_time);
        if (!exists) {
          console.log('Adding missing last_committed segment:', last_committed.start_time);
          transcriptionsData["transcriptions"].push(last_committed);
          transcriptionsData["transcriptions"].sort((a, b) => a.start_time - b.start_time);
        }
      }

      if (data.partial) {
        transcriptionsData["partial"] = data;
      } else {
        transcriptionsData["partial"] = null;
        const exists = transcriptionsData["transcriptions"].some(t => t.start_time === data.start_time);
        if (!exists) {
          transcriptionsData["transcriptions"].push(data);
          transcriptionsData["transcriptions"].sort((a, b) => a.start_time - b.start_time);
        }
      }
      populateCombinedSelect();
      refreshView();
    });

    socket.on('error', function (data) {
      console.error('WebSocket error:', data);
      statusIndicator.className = 'inline-block w-3 h-3 rounded-full bg-red-500';
      statusText.textContent = 'Error: ' + data.message;
    });

    // Handle window resize to recalculate grid
    window.addEventListener('resize', function () {
      if (currentLayout === 'grid') {
        refreshGridView();
      }
    });

    window.addEventListener('load', function () {
      populateCombinedSelect();
      const params = new URLSearchParams(window.location.search);
      const initialLayout = params.get('layout') || 'grid';
      document.getElementById('combined-select').value = initialLayout;
      switchLayout(initialLayout);
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', function () {
      socket.disconnect();
    });
  });
</script>
{% endblock %}
