# Prompt templates and per-provider model settings for the chat-completion
# translators. Edit this file to tune prompts or swap models without touching
# providers.py. Structural per-provider fields (endpoint, api key, system role)
# stay in the provider classes.
#
# Prompt placeholders are filled with str.format:
#   correct   -> {keywords}
#   translate -> {language} {tone} {keywords} {prev_translation}
#   extract_keywords -> (no placeholders; sent verbatim)

[prompts]
correct = """
Correct the user's ASR transcript literally. No styling/summaries. \
\nRemove speech disfluencies and redundant fillers and dirty words. \
\nOutput ONLY the corrected text.

Context(ordered): {keywords}"""

translate = """
Role: Native {language} Expert Translator & Localizer.
Task: Translate <translate_this> into natural, native-level {language}.

Rules:
1. Ensure accuracy first; Tone: {tone}.
2. Adapt target conventions. Fix punctuation.
3. Maintain continuity with the previous translation; do not rephrase consistent parts.
4. Use <context> for reference only. NEVER repeat or continue them.
5. Output ONLY the final translated text of <translate_this>. No explanations.

Keywords(ordered): {keywords}
Previous translation: {prev_translation}
"""

extract_keywords = """
If there are special nouns or names in the provided text, add them to the special_keywords list.
Exclude time, numbers, and common words.
Return in json format:
{"special_keywords": []}"""

# Human-readable tone descriptions substituted into {tone}. Unknown tones are
# passed through as-is; empty tone falls back to "fluent".
[tone_map]
formal = "formal business"
fluent = "natural and fluency"
casual = "casual and conversational"
literal = "literal and word-for-word"

# Per-provider request-body fragments merged into each chat-completions call.
[providers.gemini.correct]
model = "gemini-3.1-flash-lite"
reasoning_effort = "low"
temperature = 0

[providers.gemini.translate]
model = "gemini-3.1-flash-lite"
reasoning_effort = "minimal"
temperature = 0

[providers.gemini.extract]
model = "gemini-3.1-flash-lite"
response_format = { type = "json_object" }
temperature = 0

[providers.openai.correct]
model = "gpt-5.4-nano"
max_completion_tokens = 300
reasoning_effort = "none"

[providers.openai.translate]
model = "gpt-5.4-nano"
max_completion_tokens = 300
reasoning_effort = "none"

[providers.openai.extract]
model = "gpt-5.4-mini"
response_format = { type = "json_object" }

[providers.groq.correct]
model = "openai/gpt-oss-120b"
reasoning_effort = "low"

[providers.groq.translate]
model = "openai/gpt-oss-120b"
reasoning_effort = "low"

[providers.groq.extract]
model = "openai/gpt-oss-120b"
response_format = { type = "json_object" }

[providers.cerebras.correct]
model = "gpt-oss-120b"
reasoning_effort = "low"

[providers.cerebras.translate]
model = "gpt-oss-120b"
reasoning_effort = "low"

[providers.cerebras.extract]
model = "gpt-oss-120b"
response_format = { type = "json_object" }
